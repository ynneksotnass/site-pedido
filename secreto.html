<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Segredo 💛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark-love">
    <!-- Camada de frases e corações flutuantes -->
    <div id="secret-effects-container" class="secret-effects-layer"></div>

    <div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh; position: relative; z-index: 30;">
        <div class="row justify-content-center w-100">
            <div class="col-md-8 col-lg-6">
                <!-- CARD CENTRAL DARK -->
                <div id="unlock-card" class="message-card shadow-lg p-5 rounded-4 text-center dark-glass animate-float">
                    <div class="mb-4">
                        <i class="fas fa-lock color-yellow-gold fa-3x heart-beat"></i>
                    </div>
                    <h2 class="font-love color-purple mb-4">Shhh... É segredo!</h2>
                    <p class="text-light mb-4">Escreva a palavra secreta para revelar o que eu sinto:</p>
                    
                    <div class="input-group mb-3 custom-input-group">
                        <input type="text" id="secret-word" class="form-control bg-transparent text-light border-purple" placeholder="Qual a palavra?">
                        <button class="btn btn-purple" onclick="revelarSegredo()">Revelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FRASE EM TELA CHEIA (INICIALMENTE ESCONDIDA) -->
    <div id="full-screen-secret" class="full-screen-reveal d-none">
        <div class="reveal-content text-center p-4">
            <h1 class="font-love text-yellow-gold">
                "Eu te amo daqui até a lua em passos de tartaruga.<span class="heart-beat">💛</span>"
            </h1>
            <i class="fas fa-turtle fa-3x text-purple mt-4"></i>
            <br>
            <button class="btn btn-outline-light mt-5" onclick="fecharSegredo()">Voltar</button>
        </div>
    </div>

    <!-- HUB INFERIOR (MANTÉM O PADRÃO ORIGINAL) -->
    <nav class="navbar fixed-bottom bg-hub border-top shadow-lg">
        <div class="container d-flex justify-content-around">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i></a>
            <a href="tempo.html" class="nav-btn"><i class="fas fa-clock"></i></a>
            <a href="motivos.html" class="nav-btn"><i class="fas fa-list-ul"></i></a>
            <a href="quiz.html" class="nav-btn"><i class="fas fa-gamepad"></i></a>
            <a href="secreto.html" class="nav-btn active"><i class="fas fa-user-secret"></i></a>
        </div>
    </nav>

    <!-- Bloqueio Global -->
<div id="global-lock-overlay" class="lock-overlay">
    <div class="lock-content text-center">
        <i class="fas fa-lock fa-3x color-purple mb-4 heart-beat"></i>
        <h1 class="font-love color-purple">Aguarde o momento especial...</h1>
        <div id="main-countdown" class="countdown-badge shadow-lg mt-3">
            <span id="lock-timer">00d 00h 00m 00s</span>
        </div>
    </div>
</div>

<!-- Envolva todo o conteúdo original (incluindo o Hub) em uma div de conteúdo -->
<div id="site-content" style="display: none;">
    <!-- Todo o seu código anterior aqui (Container, Modais, Hub, etc) -->
</div>

    <script src="script.js"></script>
</body>
</html>
