<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Tempo Juntos 💛</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-comfort">
    <div class="floating-hearts" id="hearts-container"></div>

    <div class="container py-4 mb-5 position-relative" style="z-index: 10;">
        <header class="text-center mb-5">
            <h1 class="font-love color-purple animate-float">O Nosso Tempo</h1>
        </header>

        <div class="row justify-content-center text-center">
            <div class="col-12 col-md-8">
                <!-- CRONÔMETRO PROGRESSIVO -->
                <div class="row g-3 mb-5">
                    <div class="col-6 col-md-3">
                        <div class="timer-card shadow-lg p-3 rounded-4 bg-card-custom">
                            <h2 id="total-days" class="fw-bold color-purple">0</h2>
                            <p class="small text-uppercase">Dias</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="timer-card shadow-lg p-3 rounded-4 bg-card-custom">
                            <h2 id="total-hours" class="fw-bold color-purple">0</h2>
                            <p class="small text-uppercase">Horas</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="timer-card shadow-lg p-3 rounded-4 bg-card-custom">
                            <h2 id="total-minutes" class="fw-bold color-purple">0</h2>
                            <p class="small text-uppercase">Minutos</p>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="timer-card shadow-lg p-3 rounded-4 bg-card-custom">
                            <h2 id="total-seconds" class="fw-bold color-purple">0</h2>
                            <p class="small text-uppercase">Segundos</p>
                        </div>
                    </div>
                </div>
                
                <!-- TEXTO COM ESTILO DA SEGUNDA IMAGEM -->
                <div class="message-card shadow-lg p-4 rounded-4 mx-auto" style="max-width: 600px;">
                    <div class="text-center mb-3">
                        <i class="fas fa-infinity fa-3x heart-beat" style="color: var(--yellow-gold); filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));"></i>
                    </div>
                    <p class="highlight-text text-center">
                        Cada tempo com você se torna os melhores segundos da minha vida. Só ficarei satisfeito quando esse cronômetro continuar até o final de nossas vidas.
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- HUB INFERIOR -->
    <nav class="navbar fixed-bottom bg-hub border-top shadow-lg">
        <div class="container d-flex justify-content-around">
            <a href="index.html" class="nav-btn"><i class="fas fa-home"></i></a>
            <a href="tempo.html" class="nav-btn active"><i class="fas fa-clock"></i></a>
            <a href="motivos.html" class="nav-btn"><i class="fas fa-list-ul"></i></a>
            <a href="quiz.html" class="nav-btn"><i class="fas fa-gamepad"></i></a>
            <a href="secreto.html" class="nav-btn"><i class="fas fa-user-secret"></i></a>
        </div>
    </nav>

    <!-- Bloqueio Global -->
<div id="global-lock-overlay" class="lock-overlay">
    <div class="lock-content text-center">
        <i class="fas fa-lock fa-3x color-purple mb-4 heart-beat"></i>
        <h1 class="font-love color-purple">Aguarde o momento especial...</h1>
        <div id="main-countdown" class="countdown-badge shadow-lg mt-3">
            <span id="lock-timer">00d 00h 00m 00s</span>
        </div>
    </div>
</div>

<!-- Envolva todo o conteúdo original (incluindo o Hub) em uma div de conteúdo -->
<div id="site-content" style="display: none;">
    <!-- Todo o seu código anterior aqui (Container, Modais, Hub, etc) -->
</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
